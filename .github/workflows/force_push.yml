name: Test Force Push Trigger

on:
  pull_request:
    types: [synchronize]   # 仅在 PR 分支有新提交（包括强推）时触发

jobs:
  check-force-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整历史，便于比较

      - name: Log commit info
        run: |
          echo "Triggered by push (or force push) to PR branch"
          echo "Latest commit SHA: ${{ github.event.pull_request.head.sha }}"
          echo "Previous commit SHA: ${{ github.event.before }}"
          echo "Force push detected: ${{ github.event.forced }}"

      - name: Add comment to PR (optional)
        uses: actions/github-script@v7
        with:
          script: |
            const forced = context.payload.forced;
            const msg = forced
              ? '⚠️ 检测到强制推送（force push），流水线已触发。'
              : '✅ 普通推送触发流水线。';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: msg
            });
