name: Auto Label PR PPPPPPPPPPPPPPPPPPPPPPPPP AAAAAAAAAAAAAAAAAAAAAAAAAA EEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE hhh

on:
  pull_request:
    types: [opened]

jobs:
  label_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add AAAA label
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['AAAA']
            })
